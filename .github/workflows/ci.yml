name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install circom
        run: |
          if ! command -v circom &> /dev/null; then
            git clone https://github.com/zkmopro/circom.git
            cd circom
            cargo install --path circom
          fi

      - name: Install wasm-bindgen-cli
        run: |
          if ! command -v wasm-bindgen &> /dev/null; then
            cargo install wasm-bindgen-cli --version 0.2.125 --locked
          fi

      - name: Install C++ build dependencies
        run: sudo apt-get install -y nasm libgmp-dev nlohmann-json3-dev

      - name: Clone circuit-registry
        run: git clone https://github.com/zkmopro/circuit-registry.git

      - name: Compile circuits
        run: |
          cd circuit-registry/multiplier2
          circom --c --wasm --rust multiplier2.circom
          cd ../keccak256
          npm install
          circom --c --wasm --rust -l node_modules keccak256_256_test.circom
          cd ../rsa
          npm install
          circom --c --wasm --rust -l node_modules main.circom

      - name: Build C++ witnesses
        run: |
          make -C circuit-registry/multiplier2/multiplier2_cpp
          make -C circuit-registry/keccak256/keccak256_256_test_cpp
          make -C circuit-registry/rsa/main_c_cpp

      - name: Build Rust witnesses
        run: |
          for entry in \
            "circuit-registry/multiplier2:multiplier2" \
            "circuit-registry/keccak256:keccak256_256_test" \
            "circuit-registry/rsa:main_c"; do
            DIR="${entry%%:*}"
            NAME="${entry##*:}"
            RUST_DIR="${DIR}/${NAME}_rust"
            mkdir -p "${RUST_DIR}/examples"
            sed "s/CIRCUIT_CRATE/${NAME}/g" witness_template.rs > "${RUST_DIR}/examples/witness.rs"
            if ! grep -q 'serde_json' "${RUST_DIR}/Cargo.toml"; then
              sed -i '/^\[dependencies\]/a serde_json = "1"' "${RUST_DIR}/Cargo.toml"
            fi
            # Make rayon target-conditional so the crate also compiles for wasm32
            if grep -q '^rayon' "${RUST_DIR}/Cargo.toml"; then
              sed -i '/^rayon/d' "${RUST_DIR}/Cargo.toml"
              printf '\n[target.'"'"'cfg(not(target_arch = "wasm32"))'"'"'.dependencies]\nrayon = "1"\n' \
                >> "${RUST_DIR}/Cargo.toml"
            fi
            # Guard compute_witness_batch (which uses rayon) so it only compiles for non-wasm targets
            sed -i 's/^pub fn compute_witness_batch(/#[cfg(not(target_arch = "wasm32"))]\npub fn compute_witness_batch(/' \
              "${RUST_DIR}/src/lib.rs"
            cargo build --release --example witness --manifest-path "${RUST_DIR}/Cargo.toml"
          done

      - name: Build Rust-WASM witnesses
        run: |
          cargo build --release --target wasm32-unknown-unknown \
            --manifest-path wasm-witnesses/Cargo.toml
          for entry in \
            "multiplier2:multiplier2_wasm" \
            "keccak256:keccak256_wasm" \
            "rsa:rsa_wasm"; do
            DIR="${entry%%:*}"
            NAME="${entry##*:}"
            mkdir -p "wasm-witnesses/${DIR}/wasm_out"
            wasm-bindgen \
              "wasm-witnesses/target/wasm32-unknown-unknown/release/${NAME}.wasm" \
              --out-dir "wasm-witnesses/${DIR}/wasm_out" \
              --target nodejs \
              --out-name "${NAME}"
          done

      - name: Benchmark witness generation
        run: python3 benchmark.py 5
